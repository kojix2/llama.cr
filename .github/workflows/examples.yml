name: examples

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    env:
      MODEL_PATH: models/tiny_model.gguf
      TINY_MODEL_URL: https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake

      - name: Set llama.cpp version
        id: set_version
        run: |
          echo "LLAMA_VERSION=$(cat LLAMA_VERSION)" >> $GITHUB_ENV

      - name: Install llama.cpp (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          curl -L https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_VERSION}/llama-${LLAMA_VERSION}-bin-ubuntu-x64.tar.gz -o llama.tar.gz
          tar -xzf llama.tar.gz
          LLAMA_DIR=$(ls -d llama-${LLAMA_VERSION}* | head -n1)
          sudo mkdir -p /usr/local/lib
          sudo cp "$LLAMA_DIR"/*.so* /usr/local/lib/ || true
          sudo ldconfig
      - name: Install llama.cpp (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_VERSION}/llama-${LLAMA_VERSION}-bin-macos-arm64.tar.gz -o llama.tar.gz
          tar -xzf llama.tar.gz
          LLAMA_DIR=$(ls -d llama-${LLAMA_VERSION}* | head -n1)
          sudo mkdir -p /usr/local/lib
          sudo cp "$LLAMA_DIR"/*.dylib* /usr/local/lib/ || true

      - name: Set library path (Linux)
        if: runner.os == 'Linux'
        run: |
          echo 'LIBRARY_PATH=/usr/local/lib' >> $GITHUB_ENV
          echo 'LD_LIBRARY_PATH=/usr/local/lib' >> $GITHUB_ENV

      # Set the DYLD_LIBRARY_PATH for macOS to include the installed library path
      - name: Set library path (macOS)
        if: runner.os == 'macOS'
        run: |
          echo 'LIBRARY_PATH=/usr/local/lib' >> $GITHUB_ENV
          echo 'DYLD_LIBRARY_PATH=/usr/local/lib' >> $GITHUB_ENV

      - name: Install dependencies
        run: shards install

      - name: Cache model files
        id: cache-models
        uses: actions/cache@v5
        with:
          path: models
          key: ${{ runner.os }}-models-tinyllama-v2

      - name: Download test model (if not cached)
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          curl -L "$TINY_MODEL_URL" -o "$MODEL_PATH"

      - name: Build examples
        run: |
          crystal build examples/simple.cr -o simple_example
          crystal build examples/chat.cr -o chat_example
          crystal build examples/tokenize.cr -o tokenize_example

      - name: Run simple example
        run: ./simple_example --model "$MODEL_PATH"

      - name: Run chat example
        run: ./chat_example --model "$MODEL_PATH"

      - name: Run tokenization example
        run: ./tokenize_example --model "$MODEL_PATH" --prompt "Hello, world!"
