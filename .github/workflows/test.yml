name: test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    env:
      CRYSTAL_OPTS: --error-trace
      GC_DEBUG: "1"
      MODEL_PATH: models/tiny_model.gguf
      ADAPTER_PATH: adapters/tiny_model_adapter.gguf
      TINY_MODEL_URL: https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf
      TINY_ADAPTER_URL: https://huggingface.co/makaveli10/tinyllama-function-call-lora-adapter-250424-F16-GGUF/resolve/main/tinyllama-function-call-lora-adapter-250424-f16.gguf
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        spec_file:
          - spec/llama_spec.cr
          - spec/context_spec.cr
          - spec/state_spec.cr
          - spec/batch_spec.cr
          - spec/sampler_spec.cr
          - spec/vocab_spec.cr
          - spec/model_spec.cr
          - spec/adapter_lora_spec.cr
          - spec/context_lora_spec.cr

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake

      - name: Set llama.cpp version
        id: set_version
        run: |
          echo "LLAMA_VERSION=$(cat LLAMA_VERSION)" >> $GITHUB_ENV

      - name: Install llama.cpp (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          curl -L https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_VERSION}/llama-${LLAMA_VERSION}-bin-ubuntu-x64.tar.gz -o llama.tar.gz
          tar -xzf llama.tar.gz
          LLAMA_DIR=$(ls -d llama-${LLAMA_VERSION}* | head -n1)
          sudo mkdir -p /usr/local/lib
          sudo cp "$LLAMA_DIR"/*.so* /usr/local/lib/
          sudo ldconfig

      - name: Install llama.cpp (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_VERSION}/llama-${LLAMA_VERSION}-bin-macos-arm64.tar.gz -o llama.tar.gz
          tar -xzf llama.tar.gz
          LLAMA_DIR=$(ls -d llama-${LLAMA_VERSION}* | head -n1)
          sudo mkdir -p /usr/local/lib
          sudo cp "$LLAMA_DIR"/*.dylib* /usr/local/lib/

      - name: Set library path (Linux)
        if: runner.os == 'Linux'
        run: |
          echo 'LIBRARY_PATH=/usr/local/lib' >> $GITHUB_ENV
          echo 'LD_LIBRARY_PATH=/usr/local/lib' >> $GITHUB_ENV

      - name: Set GGML backend path (Linux)
        if: runner.os == 'Linux'
        run: |
          BACKEND_PATH=""
          if [ -f /usr/local/lib/libggml-cpu-x64.so ]; then
            BACKEND_PATH=/usr/local/lib/libggml-cpu-x64.so
          elif [ -f /usr/local/lib/libggml-cpu-haswell.so ]; then
            BACKEND_PATH=/usr/local/lib/libggml-cpu-haswell.so
          else
            BACKEND_PATH=$(ls /usr/local/lib/libggml-cpu-*.so 2>/dev/null | head -n1 || true)
          fi
          if [ -n "$BACKEND_PATH" ]; then
            echo "GGML_BACKEND_PATH=$BACKEND_PATH" >> $GITHUB_ENV
            echo "Using GGML_BACKEND_PATH=$BACKEND_PATH"
          else
            echo "No libggml-cpu-*.so found under /usr/local/lib; backend auto-detection will be used"
          fi

      - name: Set library path (macOS)
        if: runner.os == 'macOS'
        run: |
          echo 'LIBRARY_PATH=/usr/local/lib' >> $GITHUB_ENV
          echo 'DYLD_LIBRARY_PATH=/usr/local/lib' >> $GITHUB_ENV

      - name: Set GGML backend path (macOS)
        if: runner.os == 'macOS'
        run: |
          BACKEND_PATH=""
          if [ -f /usr/local/lib/libggml-cpu-arm64.dylib ]; then
            BACKEND_PATH=/usr/local/lib/libggml-cpu-arm64.dylib
          else
            BACKEND_PATH=$(ls /usr/local/lib/libggml-cpu-*.dylib 2>/dev/null | head -n1 || true)
          fi
          if [ -n "$BACKEND_PATH" ]; then
            echo "GGML_BACKEND_PATH=$BACKEND_PATH" >> $GITHUB_ENV
            echo "Using GGML_BACKEND_PATH=$BACKEND_PATH"
          else
            echo "No libggml-cpu-*.dylib found under /usr/local/lib; backend auto-detection will be used"
          fi

      - name: Install dependencies
        run: shards install

      - name: Build
        run: crystal build --no-codegen src/llama.cr

      - name: Cache test assets
        uses: actions/cache@v5
        with:
          path: |
            models
            adapters
          key: ${{ runner.os }}-test-assets-tinyllama-v3

      - name: Ensure test assets
        run: |
          mkdir -p models adapters
          [ -f "$MODEL_PATH" ] || curl -L "$TINY_MODEL_URL" -o "$MODEL_PATH"
          [ -f "$ADAPTER_PATH" ] || curl -L "$TINY_ADAPTER_URL" -o "$ADAPTER_PATH"

      - name: Run spec file ${{ matrix.spec_file }}
        run: |
          echo "Running ${{ matrix.spec_file }}"
          echo "Model path: $MODEL_PATH"
          echo "Adapter path: $ADAPTER_PATH"
          echo "Working directory: $(pwd)"
          crystal spec "${{ matrix.spec_file }}"

      - name: Run static analysis
        run: crystal tool format --check
